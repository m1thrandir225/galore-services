apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: galore-api
  namespace: galore
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - host: galore.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 9090


